<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <!-- 目标语言选择 -->
    <div class="select-row">
        <span class="select-label">翻译为</span>
        <select id="targetLanguage" class="select">
            <option value="zh-CN">中文(简体)</option>
            <option value="en">英语</option>
            <option value="ja">日语</option>
            <option value="ko">韩语</option>
            <option value="fr">法语</option>
            <option value="de">德语</option>
        </select>
    </div>

    <!-- 翻译引擎选择 -->
    <div class="select-row">
        <span class="select-label">引擎</span>
        <select id="translatorProvider" class="select">
            <option value="edge">Edge (推荐)</option>
            <option value="google">Google</option>
        </select>
    </div>

    <!-- 核心操作按钮 -->
    <button id="actionBtn" class="btn btn-primary">翻译</button>

    <!-- 状态提示 -->
    <div id="statusText" class="status"></div>
</div>

<script src="popup.js"></script>
</body>
</html>
