<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h3>智能页面翻译</h3>
    </div>

    <div class="status-bar">
        <span class="status-icon" id="statusIcon"></span>
        <span class="status-text" id="statusText">初始化...</span>
    </div>

    <div class="info-row">
        <span class="label">页面语言:</span>
        <span class="value" id="detectedLang">检测中...</span>
    </div>

    <div class="settings-row">
        <label class="setting-label">目标语言</label>
        <select id="targetLanguage" class="select-input">
            <!-- 动态填充 -->
        </select>
    </div>

    <div class="button-group">
        <button id="translateBtn" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M5 8L10 13M4 14L10 8L12 5M2 5H8M14 15C14 15 16 18 19 19M15 11L19 15M19 10V14H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            翻译页面
        </button>
        <button id="restoreBtn" class="btn btn-secondary" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M3 12C3 16.97 7.03 21 12 21C16.97 21 21 16.97 21 12C21 7.03 16.97 3 12 3C9.24 3 6.78 4.21 5.24 6.04M5 3V7H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            恢复原文
        </button>
    </div>

    <div class="footer">
        <div class="setting-row">
            <label class="checkbox-label">
                <input type="checkbox" id="autoTranslate">
                <span>自动翻译外文页面</span>
            </label>
        </div>
        <div class="setting-row">
            <label class="setting-label">翻译引擎</label>
            <select id="translatorProvider" class="select-input">
                <option value="viki">Viki翻译 (默认)</option>
                <option value="bing">Bing 翻译</option>
            </select>
        </div>
    </div>
</div>

<script src="popup.js"></script>
</body>
</html>
